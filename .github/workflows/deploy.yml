name: Deploy Frontend to Cloud

on:
  push:
    tags:
      - 'v*' # 仅当推送以 v 开头的版本 Tag 时触发编译与自动部署流水线 (例如 v1.0.0)

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local Docker image
        run: |
          # 编译时注入物理 API 接口相对路径
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || '/api' }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL || '' }} \
            -t xbnest-frontend-prod:latest -f ./Dockerfile .

      - name: Save Docker image as tar archive
        run: |
          docker save xbnest-frontend-prod:latest | gzip > xbnest-frontend-prod.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image-tar
          path: xbnest-frontend-prod.tar.gz
          retention-days: 1

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image-tar

      - name: Generate .env file
        run: |
          echo "FRONTEND_PORT=${{ secrets.FRONTEND_PORT || '8080' }}" > .env
          echo "FRONTEND_IMAGE=xbnest-frontend-prod:latest" >> .env

      - name: Render Nginx Template
        env:
          DOMAIN: ${{ secrets.DOMAIN || 'xiaobao.work' }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT || '8081' }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '8080' }}
        run: |
          mkdir -p out
          envsubst '${DOMAIN} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.conf.template > out/xiaobao.conf
          envsubst '${DOMAIN} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.http.template > out/xiaobao.http

      - name: Copy docker-compose, .env, config and image tar via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml,.env,out/xiaobao.conf,out/xiaobao.http,xbnest-frontend-prod.tar.gz"
          target: "/www/wwwroot/xbnest/frontend/"

      - name: SSH Remote Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            mkdir -p /www/wwwroot/xbnest/frontend
            cd /www/wwwroot/xbnest/frontend
            
            # 物理自动校验并静默组建外部 Docker 共享网络以打通隔离屏障
            docker network inspect xbnest-net >/dev/null 2>&1 || docker network create xbnest-net
            
            # ⚡ 自动物理载入前端镜像压缩包
            if [ -f "xbnest-frontend-prod.tar.gz" ]; then
              echo "[Deploy] 🛡️ 发现前端物理镜像压缩包，开始执行 Docker 物理装载导入..."
              docker load -i xbnest-frontend-prod.tar.gz
              echo "[Deploy] ✓ 镜像装载完成，正在清理临时物理包以节省服务器硬盘..."
              rm -f xbnest-frontend-prod.tar.gz
            fi
            
            # 物理拉起容器
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # ⚡ 自动同步部署并安全重载 Nginx 配置 (适配宝塔面板环境，支持自适应证书降级)
            if [ -f "/etc/nginx/certs/${{ secrets.DOMAIN || 'xiaobao.work' }}.pem" ]; then
              echo "[Deploy] 🛡️ 检测到 SSL 证书已就绪，正在应用 HTTPS 安全站点配置..."
              sudo mv out/xiaobao.conf /www/server/panel/vhost/nginx/xiaobao.conf
            else
              echo "[Deploy] ⚠️ 未在宿主机检测到 SSL 证书物理文件，自适应降级部署 [纯 HTTP 站点]..."
              sudo mv out/xiaobao.http /www/server/panel/vhost/nginx/xiaobao.conf
            fi
            
            # ⚡ 自适应探测 Nginx 可执行文件绝对路径
            NGINX_BIN=""
            RUNNING_PID=$(pgrep -o nginx || true)
            if [ -n "$RUNNING_PID" ]; then
              RUNNING_NGINX=$(readlink -f /proc/$RUNNING_PID/exe 2>/dev/null || true)
              if [ -n "$RUNNING_NGINX" ] && sudo test -x "$RUNNING_NGINX"; then
                NGINX_BIN="$RUNNING_NGINX"
                echo "[Deploy] ⚡ 从运行中进程成功锁定 Nginx 路径: $NGINX_BIN"
              fi
            fi
            
            if [ -z "$NGINX_BIN" ]; then
              for path in "/www/server/nginx/sbin/nginx" "/usr/sbin/nginx" "/usr/local/nginx/sbin/nginx" "/usr/bin/nginx"; do
                if sudo test -x "$path"; then
                  NGINX_BIN="$path"
                  break
                fi
              done
            fi
            
            if [ -z "$NGINX_BIN" ]; then
              GLOBAL_NGINX=$(sudo which nginx 2>/dev/null || true)
              if [ -n "$GLOBAL_NGINX" ] && sudo test -x "$GLOBAL_NGINX"; then
                NGINX_BIN="$GLOBAL_NGINX"
              else
                if command -v nginx >/dev/null 2>&1; then
                  NGINX_BIN="nginx"
                else
                  echo "[Deploy] ❌ 宿主机未检测到有效的 Nginx 可执行文件！"
                  exit 1
                fi
              fi
            fi
            
            echo "[Deploy] 探测到 Nginx 执行路径: $NGINX_BIN"
            sudo $NGINX_BIN -t
            sudo $NGINX_BIN -s reload
            echo "[Deploy] ✓ 宿主机宝塔 Nginx 自适应部署配置成功并安全重载！"
            
            docker image prune -f
