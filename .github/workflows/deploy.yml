name: Deploy Frontend to Cloud

on:
  push:
    tags:
      - 'v*' # 仅当推送以 v 开头的版本 Tag 时触发编译与自动部署流水线 (例如 v1.0.0)

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase registry image name
        run: |
          # ⚠️ 避坑：Docker 镜像包命名强制要求全小写，在此通过 bash 物理转为小写以防大写用户名导致构建熔断
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 Actions 内置免密 Token 登录 GHCR 仓库

      - name: Extract Metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ # 前端目录的 context (即前端仓库根目录)
          file: ./Dockerfile
          push: true
          build-args: |
            # 物理接收编译时环境变量，若未配置则默认使用相对路径 /api 保证生产环境健壮性
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || '/api' }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase registry image name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Generate .env file
        run: |
          echo "FRONTEND_PORT=${{ secrets.FRONTEND_PORT || '8080' }}" > .env
          echo "FRONTEND_IMAGE=ghcr.io/${{ env.IMAGE_NAME }}:latest" >> .env

      - name: Render Nginx Template
        env:
          DOMAIN: ${{ secrets.DOMAIN || 'xiaobao.work' }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT || '8081' }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '8080' }}
        run: |
          mkdir -p out
          envsubst '${DOMAIN} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.conf.template > out/xiaobao.conf

      - name: Copy docker-compose and .env via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml,.env,out/xiaobao.conf"
          target: "/www/wwwroot/xbnest/frontend/"

      - name: SSH Remote Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            mkdir -p /www/wwwroot/xbnest/frontend
            cd /www/wwwroot/xbnest/frontend
            # 物理自动校验并静默组建外部 Docker 共享网络以打通隔离屏障
            docker network inspect xbnest-net >/dev/null 2>&1 || docker network create xbnest-net
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            
            # ⚡ 自动同步部署并安全重载 Nginx 配置
            if [ -f "out/xiaobao.conf" ]; then
              echo "[Deploy] 发现编译后的 Nginx 配置文件，正在移至配置目录..."
              sudo mv out/xiaobao.conf /etc/nginx/conf.d/xiaobao.conf
              sudo nginx -t
              sudo nginx -s reload
              echo "[Deploy] ✓ 宿主机 Nginx 自动配置成功且重载完毕！"
            fi
            
            docker image prune -f
