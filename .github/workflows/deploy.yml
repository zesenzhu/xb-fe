name: Deploy Frontend to Cloud

on:
  push:
    tags:
      - 'v*' # 仅当推送以 v 开头的版本 Tag 时触发编译与自动部署流水线 (例如 v1.0.0)

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase registry image name
        run: |
          # ⚠️ 避坑：Docker 镜像包命名强制要求全小写，在此通过 bash 物理转为小写以防大写用户名导致构建熔断
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用 Actions 内置免密 Token 登录 GHCR 仓库

      - name: Extract Metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./ # 前端目录的 context (即前端仓库根目录)
          file: ./Dockerfile
          push: true
          build-args: |
            # 物理接收编译时环境变量，若未配置则默认使用相对路径 /api 保证生产环境健壮性
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || '/api' }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase registry image name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Generate .env file
        run: |
          echo "FRONTEND_PORT=${{ secrets.FRONTEND_PORT || '8080' }}" > .env
          echo "FRONTEND_IMAGE=ghcr.io/${{ env.IMAGE_NAME }}:latest" >> .env

      - name: Render Nginx Template
        env:
          DOMAIN: ${{ secrets.DOMAIN || 'xiaobao.work' }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT || '8081' }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '8080' }}
        run: |
          mkdir -p out
          envsubst '${DOMAIN} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.conf.template > out/xiaobao.conf
          envsubst '${DOMAIN} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.http.template > out/xiaobao.http

      - name: Copy docker-compose and .env via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml,.env,out/xiaobao.conf,out/xiaobao.http"
          target: "/www/wwwroot/xbnest/frontend/"

      - name: SSH Remote Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            mkdir -p /www/wwwroot/xbnest/frontend
            cd /www/wwwroot/xbnest/frontend
            # 物理自动校验并静默组建外部 Docker 共享网络以打通隔离屏障
            docker network inspect xbnest-net >/dev/null 2>&1 || docker network create xbnest-net
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # ⚡ 自动同步部署并安全重载 Nginx 配置 (适配宝塔面板环境，支持自适应证书降级)
            # 动态检测宿主机上是否放置了对应域名的物理证书文件
            if [ -f "/etc/nginx/certs/${{ secrets.DOMAIN || 'xiaobao.work' }}.pem" ]; then
              echo "[Deploy] 🛡️ 检测到 SSL 证书已就绪，正在应用 HTTPS 安全站点配置..."
              sudo mv out/xiaobao.conf /www/server/panel/vhost/nginx/xiaobao.conf
            else
              echo "[Deploy] ⚠️ 未在宿主机检测到 SSL 证书物理文件，自适应降级部署 [纯 HTTP 站点]..."
              sudo mv out/xiaobao.http /www/server/panel/vhost/nginx/xiaobao.conf
            fi
            
            # ⚡ 自适应探测 Nginx 可执行文件物理绝对路径 (解决多环境下命令找不到问题)
            NGINX_BIN=""
            for path in "/www/server/nginx/sbin/nginx" "/usr/sbin/nginx" "/usr/local/nginx/sbin/nginx" "/usr/bin/nginx"; do
              if sudo test -x "$path"; then
                NGINX_BIN="$path"
                break
              fi
            done
            
            if [ -z "$NGINX_BIN" ]; then
              # 尝试借助 sudo which 命令进行系统内定位
              GLOBAL_NGINX=$(sudo which nginx 2>/dev/null || true)
              if [ -n "$GLOBAL_NGINX" ] && sudo test -x "$GLOBAL_NGINX"; then
                NGINX_BIN="$GLOBAL_NGINX"
              else
                if command -v nginx >/dev/null 2>&1; then
                  NGINX_BIN="nginx"
                else
                  echo "[Deploy] ❌ 宿主机未检测到有效的 Nginx 可执行文件！"
                  exit 1
                fi
              fi
            fi
            
            echo "[Deploy] 探测到 Nginx 执行路径: $NGINX_BIN"
            sudo $NGINX_BIN -t
            sudo $NGINX_BIN -s reload
            echo "[Deploy] ✓ 宿主机宝塔 Nginx 自适应部署配置成功并安全重载！"
            
            docker image prune -f
