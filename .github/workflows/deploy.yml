name: Deploy Frontend to Cloud

on:
  push:
    tags:
      - 'v*' # 仅当推送以 v 开头的版本 Tag 时触发编译与自动部署流水线 (例如 v1.0.0)

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject version info
        run: |
          echo "{\"commit\":\"$(git rev-parse --short HEAD)\",\"message\":\"$(git log -1 --pretty=%B | tr -d '\r\n')\",\"date\":\"$(git log -1 --format=%cd)\",\"buildTime\":\"$(date)\",\"env\":\"production\"}" > public/version.json

      - name: Build local Docker image
        run: |
          # 编译时注入物理 API 接口相对路径
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || '/api' }} \
            --build-arg NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL || '' }} \
            -t xbnest-frontend-prod:latest -f ./Dockerfile .

      - name: Save Docker image as tar archive
        run: |
          docker save xbnest-frontend-prod:latest | gzip > xbnest-frontend-prod.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image-tar
          path: xbnest-frontend-prod.tar.gz
          retention-days: 1

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image-tar

      - name: Generate .env file
        run: |
          echo "FRONTEND_PORT=${{ secrets.FRONTEND_PORT || '8083' }}" > .env
          echo "FRONTEND_IMAGE=xbnest-frontend-prod:latest" >> .env

      - name: Render Nginx Template
        env:
          DOMAIN: ${{ secrets.DOMAIN || 'xiaobao.work' }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT || '8081' }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT || '8083' }}
        run: |
          mkdir -p out
          envsubst '${DOMAIN} ${SERVER_HOST} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.conf.template > out/xiaobao.conf
          envsubst '${DOMAIN} ${SERVER_HOST} ${BACKEND_PORT} ${FRONTEND_PORT}' < .nginx/xiaobao.http.template > out/xiaobao.http

      - name: Copy docker-compose, .env, config and image tar via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.prod.yml,.env,out/xiaobao.conf,out/xiaobao.http,xbnest-frontend-prod.tar.gz"
          target: "/www/wwwroot/xbnest/frontend/"

      - name: SSH Remote Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            mkdir -p /www/wwwroot/xbnest/frontend
            cd /www/wwwroot/xbnest/frontend
            
            # 物理自动校验并静默组建外部 Docker 共享网络以打通隔离屏障
            docker network inspect xbnest-net >/dev/null 2>&1 || docker network create xbnest-net
            
            # ⚡ 自动物理载入前端镜像压缩包
            if [ -f "xbnest-frontend-prod.tar.gz" ]; then
              echo "[Deploy] 🛡️ 发现前端物理镜像压缩包，开始执行 Docker 物理装载导入..."
              docker load -i xbnest-frontend-prod.tar.gz
              echo "[Deploy] ✓ 镜像装载完成，正在清理临时物理包以节省服务器硬盘..."
              rm -f xbnest-frontend-prod.tar.gz
            fi
            
            # 物理拉起容器
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # ⚡ 自动同步部署并安全重载 Nginx 配置 (直接覆盖宝塔对应域名的站点配置文件)
            DOMAIN_NAME="${{ secrets.DOMAIN || 'xiaobao.work' }}"
            if [ -f "/etc/nginx/certs/${DOMAIN_NAME}.pem" ]; then
              echo "[Deploy] 🛡️ 检测到 SSL 证书已就绪，正在应用 HTTPS 安全站点配置..."
              sudo mv out/xiaobao.conf "/www/server/panel/vhost/nginx/${DOMAIN_NAME}.conf"
            else
              echo "[Deploy] ⚠️ 未在宿主机检测到 SSL 证书物理文件，自适应降级部署 [纯 HTTP 站点]..."
              sudo mv out/xiaobao.http "/www/server/panel/vhost/nginx/${DOMAIN_NAME}.conf"
            fi
            
            # ⚡ 自适应探测 Nginx 可执行文件绝对路径
            NGINX_BIN=""
            
            # 方法 1：从正在运行的 nginx 进程的命令行参数中提取路径 (普通用户也可以用 ps 查到)
            RUNNING_PATH=$(ps -ef | grep -E 'nginx: master|nginx: worker' | grep -v grep | grep -oE '/[^ ]+/nginx' | head -n 1 || true)
            if [ -n "$RUNNING_PATH" ] && [ -f "$RUNNING_PATH" ]; then
              NGINX_BIN="$RUNNING_PATH"
              echo "[Deploy] ⚡ 从运行中进程命令行成功锁定 Nginx 路径: $NGINX_BIN"
            fi
            
            # 方法 2：使用 sudo readlink 读取正在运行的 nginx PID 的 exe 软链接
            if [ -z "$NGINX_BIN" ]; then
              RUNNING_PID=$(pgrep -o nginx || true)
              if [ -n "$RUNNING_PID" ]; then
                RUNNING_NGINX=$(sudo readlink -f /proc/$RUNNING_PID/exe 2>/dev/null || true)
                if [ -n "$RUNNING_NGINX" ] && [ -f "$RUNNING_NGINX" ]; then
                  NGINX_BIN="$RUNNING_NGINX"
                  echo "[Deploy] ⚡ 从运行中进程 PID 锁定 Nginx 路径: $NGINX_BIN"
                fi
              fi
            fi
            
            # 方法 3：扫描宿主机常见物理路径 (不使用容易报无权限的 sudo test -x，直接用普通用户判断文件是否存在)
            if [ -z "$NGINX_BIN" ]; then
              for path in "/www/server/nginx/sbin/nginx" "/usr/sbin/nginx" "/usr/local/nginx/sbin/nginx" "/usr/bin/nginx"; do
                if [ -f "$path" ]; then
                  NGINX_BIN="$path"
                  echo "[Deploy] ⚡ 扫描到已存在路径: $NGINX_BIN"
                  break
                fi
              done
            fi
            
            # 方法 4：查找全局 PATH 中的 nginx
            if [ -z "$NGINX_BIN" ]; then
              GLOBAL_NGINX=$(which nginx 2>/dev/null || true)
              if [ -n "$GLOBAL_NGINX" ] && [ -f "$GLOBAL_NGINX" ]; then
                NGINX_BIN="$GLOBAL_NGINX"
              elif command -v nginx >/dev/null 2>&1; then
                NGINX_BIN="nginx"
              fi
            fi
            
            # 异常处理与诊断信息打印
            if [ -z "$NGINX_BIN" ]; then
              echo "[Deploy] ❌ 宿主机未检测到有效的 Nginx 可执行文件！"
              echo "[Deploy] ===== 正在为您收集系统进程与路径信息，用于进一步诊断 ====="
              echo "1. Nginx / OpenResty 运行状态:"
              ps -ef | grep -E 'nginx|openresty' || true
              echo "2. 系统自带的 which 结果:"
              which nginx 2>/dev/null || echo "which nginx 找不到"
              which openresty 2>/dev/null || echo "which openresty 找不到"
              echo "3. 正在全局查找名为 nginx 或 openresty 的文件 (这可能需要 5-10 秒)..."
              echo "--- 找到的 nginx 相关文件 ---"
              find /www /usr /sbin /bin -name "nginx" -type f 2>/dev/null || true
              echo "--- 找到的 openresty 相关文件 ---"
              find /www /usr /sbin /bin -name "openresty" -type f 2>/dev/null || true
              echo "[Deploy] ==========================================================="
              exit 1
            fi
            
            echo "[Deploy] 探测到 Nginx 执行路径: $NGINX_BIN"
            sudo $NGINX_BIN -t
            sudo $NGINX_BIN -s reload
            echo "[Deploy] ✓ 宿主机宝塔 Nginx 自适应部署配置成功并安全重载！"
            
            docker image prune -f
