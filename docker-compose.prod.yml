
services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/zesenzhu/xb-fe:latest}
    container_name: xbnest-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      PORT: 8080
      HOSTNAME: "0.0.0.0"
    networks:
      - xbnest-net

  gateway:
    image: caddy:alpine
    container_name: xbnest-gateway
    restart: always
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - xbnest-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  xbnest-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
