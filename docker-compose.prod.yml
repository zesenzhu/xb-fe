
services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/zesenzhu/xb-fe:latest}
    container_name: xbnest-frontend-prod
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      PORT: 8080
      HOSTNAME: "0.0.0.0"
    networks:
      - xbnest-net

networks:
  xbnest-net:
    external: true
